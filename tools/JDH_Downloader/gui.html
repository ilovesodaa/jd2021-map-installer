<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDH Downloader GUI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-glass: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6, #ef4444);
            --accent-hover: linear-gradient(135deg, #2563eb, #7c3aed, #dc2626);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.4);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.4);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: rgba(239, 68, 68, 0.3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        header {
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        p.subtitle {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Input Controls */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-family: monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }

        /* Buttons */
        .actions {
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px 32px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Terminal Logs */
        .terminal-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
            overflow: hidden;
        }

        pre {
            background: #020617;
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 20px;
            margin: 0;
            color: #10b981;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            flex-grow: 1;
            box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            line-height: 1.5;
            box-sizing: border-box;
        }

        pre span.error {
            color: #ef4444;
        }
        
        pre span.info {
            color: #3b82f6;
        }
        
        pre span.success {
            color: #10b981;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.8);
        }
    </style>
</head>
<body>

    <!-- Background Animations -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="container">
        <header>
            <h1>JDH Downloader</h1>
            <p class="subtitle">Automated Asset & NoHUD Fetching</p>
        </header>

        <div class="input-group">
            <label for="codenames">Codenames (one per line)</label>
            <textarea id="codenames" placeholder="TemperatureALT&#10;Circus&#10;Rasputin"></textarea>
        </div>

        <div class="actions">
            <button id="start-btn" onclick="startProcess()">Start Fetch</button>
        </div>

        <div class="terminal-group">
            <label>Console Output</label>
            <pre id="terminal">Waiting for input...</pre>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const startBtn = document.getElementById('start-btn');
        const codenamesInput = document.getElementById('codenames');

        // Expose addLog to the Playwright Node.js context
        window.addLog = function(message, type = 'default') {
            if (terminal.innerText === 'Waiting for input...') {
                terminal.innerHTML = '';
            }

            const span = document.createElement('span');
            
            // Basic log parsing for colors
            if (message.toLowerCase().includes('error')) type = 'error';
            else if (message.includes('[1/2]') || message.includes('[2/2]')) type = 'info';
            else if (message.toLowerCase().includes('saved') || message.toLowerCase().includes('done')) type = 'success';

            if (type !== 'default') {
                span.className = type;
            }

            span.textContent = message + '\n';
            terminal.appendChild(span);
            
            // Auto scroll to bottom
            terminal.scrollTop = terminal.scrollHeight;
        };

        window.fetchComplete = function() {
            startBtn.disabled = false;
            startBtn.textContent = 'Start Fetch';
            window.addLog('\n--- All fetches completed ---', 'success');
        };

        async function startProcess() {
            const val = codenamesInput.value.trim();
            if (!val) {
                alert('Please enter at least one codename.');
                return;
            }

            const codenames = val.split('\n')
                                 .map(c => c.trim())
                                 .filter(c => c.length > 0);

            if (codenames.length === 0) return;

            // Update UI
            startBtn.disabled = true;
            startBtn.textContent = 'Fetching...';
            terminal.innerHTML = '';
            window.addLog(`Starting batch process for ${codenames.length} map(s)...\n`, 'info');

            // Call the Node.js function exposed by Playwright
            if (window.startFetch) {
                try {
                    await window.startFetch(codenames);
                } catch (e) {
                    window.addLog(`Error triggering fetch: ${e.message}`, 'error');
                    window.fetchComplete();
                }
            } else {
                window.addLog('Error: startFetch bridge not found. Are you running in GUI mode from Node?', 'error');
                startBtn.disabled = false;
                startBtn.textContent = 'Start Fetch';
            }
        }
    </script>
</body>
</html>
